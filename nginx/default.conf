upstream backend {
    server backend:8000;
}

# ─────────────────────────────────────────────────────────────
# BACKEND API SERVER
# ─────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name api.example.com localhost;

    # API So'rovlari
    location /api/ {
        proxy_pass http://backend/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Admin Panel
    location /admin/ {
        proxy_pass http://backend/admin/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Media va Static Fayllar
    location /static/ {
        alias /var/www/sentinel/backend/assets/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /media/ {
        alias /var/www/sentinel/backend/assets/media/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # Qolgan barcha so'rovlar 404
    location / {
        return 404;
    }
}

# ─────────────────────────────────────────────────────────────
# FRONTEND SPA SERVER
# ─────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name web.example.com www.example.com example.com;

    # Frontend build fayllar
    root /var/www/frontend/dist;
    index index.html index.htm;

    # Compression
    gzip on;
    gzip_types text/plain text/css text/javascript application/javascript application/json;
    gzip_min_length 1000;

    # Cache busting uchun versioned fayllar
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # HTML fayllar - no cache
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # SPA Routing - barcha unknown routes index.html ga yo'naltiriladi
    # Bu React Router ishlashiga yordam beradi
    location / {
        # Birinchi: file bo'lsa o'sha faylni berish
        # Ikkinchi: directory bo'lsa o'sha directoriyaning index.html'ni berish
        # Uchinchi: hech nima bo'lmasa index.html berish (React Router ishlashi uchun)
        try_files $uri $uri/ /index.html;
    }

    # API requests - Backend ga proxy
    location /api/ {
        proxy_pass http://backend/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Admin panel access (agar kerak bo'lsa)
    location /admin/ {
        proxy_pass http://backend/admin/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Static files
    location /static/ {
        proxy_pass http://backend/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /media/ {
        proxy_pass http://backend/media/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
}
