<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <defs>
    <linearGradient id="shieldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0099ff;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="192" height="192" fill="#0f172a" rx="32"/>
  
  <!-- Shield shape -->
  <path d="M 96 30 L 140 50 L 140 100 C 140 135 96 160 96 160 C 96 160 52 135 52 100 L 52 50 Z" 
        fill="url(#shieldGradient)" 
        stroke="#00ff88" 
        stroke-width="2"/>
  
  <!-- Scanning lines (radar effect) -->
  <circle cx="96" cy="95" r="18" fill="none" stroke="#00ff88" stroke-width="1.5" opacity="0.6"/>
  <circle cx="96" cy="95" r="28" fill="none" stroke="#00ff88" stroke-width="1" opacity="0.4"/>
  <line x1="96" y1="67" x2="96" y2="123" stroke="#00ff88" stroke-width="1.5"/>
  <line x1="68" y1="95" x2="124" y2="95" stroke="#00ff88" stroke-width="1.5"/>
  
  <!-- Center dot -->
  <circle cx="96" cy="95" r="4" fill="#00ff88"/>
</svg>
